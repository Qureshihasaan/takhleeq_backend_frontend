name: takhleeq
services:
  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: ["product_services", "inventory_services", "user_services", "order_services", "payment_services", "ai_design_visualization", "ai_chatbot" , "broker"]
    environment:
      - VITE_API_URL=/api
  product_services:
    build:
      context: ./product_services
      dockerfile: Dockerfile
    volumes:
      - ./product_services:/code # Sync local development directory with the container
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_PRODUCT_TOPIC=${KAFKA_PRODUCT_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID_FOR_PRODUCT=${KAFKA_CONSUMER_GROUP_ID_FOR_PRODUCT}
    depends_on:
      - broker
    ports:
      - "8000:8000" # Expose container port 8000 to host port 8000
    env_file:
      - .env
    restart: on-failure

  inventory_services:
    build:
      context: ./inventory_services
      dockerfile: Dockerfile
    volumes:
      - ./inventory_services:/code # Sync local development directory with the container
    environment:
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      # - KAFKA_INVENTORY_TOPIC=${KAFKA_INVENTORY_TOPIC}
      - KAFKA_ORDER_TOPIC=${KAFKA_ORDER_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID_FOR_INVENTORY=${KAFKA_CONSUMER_GROUP_ID_FOR_INVENTORY}
    depends_on:
      - broker
    ports:
      - "8001:8000" # Expose container port 8000 to host port 8000
    env_file:
      - .env
    restart: on-failure

  user_services:
    build:
      context: ./user_services
      dockerfile: Dockerfile
    volumes:
      - ./user_services:/code # Sync local development directory with the container
    ports:
      - "8002:8000" # Expose container port 8000 to host port 8000
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_USER_TOPIC=${KAFKA_USER_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID_FOR_USER=${KAFKA_CONSUMER_GROUP_ID_FOR_USER}
      - USER_SERVICE_DATABASE_URL=${USER_SERVICE_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHMS=${ALGORITHMS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    env_file:
      - .env
    depends_on:
      - broker
    restart: on-failure

  order_services:
    build:
      context: ./order_services
      dockerfile: Dockerfile
    volumes:
      - ./order_services:/code # Sync local development directory with the container
    environment:
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_ORDER_TOPIC=${KAFKA_ORDER_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID_FOR_ORDER=${KAFKA_CONSUMER_GROUP_ID_FOR_ORDER}
      - ORDER_DATABASE_URL=${ORDER_DATABASE_URL}
    depends_on:
      - broker
    ports:
      - "8003:8000" # Expose container port 8000 to host port 8000
    env_file:
      - .env
    restart: on-failure

  notification_services:
    build:
      context: ./notification_services
      dockerfile: Dockerfile
    volumes:
      - ./notification_services:/code
    environment:
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_ORDER_TOPIC=${KAFKA_ORDER_TOPIC}
      - KAFKA_PAYMENT_TOPIC=${KAFKA_PAYMENT_TOPIC}
      - KAFKA_USER_TOPIC=${KAFKA_USER_TOPIC}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - SENDER_EMAIL_PASSWORD=${SENDER_EMAIL_PASSWORD}
    depends_on:
      - broker
    ports:
      - "8004:8000"
    env_file:
      - .env
    restart: on-failure

  payment_services:
    build:
      context: ./payment_services
      dockerfile: Dockerfile
    volumes:
      - ./payment_services:/code
    environment:
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_PAYMENT_TOPIC=${KAFKA_PAYMENT_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID_FOR_PAYMENT=${KAFKA_CONSUMER_GROUP_ID_FOR_PAYMENT}
      - PAYMENT_DATABASE_URL=${PAYMENT_DATABASE_URL}
    depends_on:
      - broker
    ports:
      - "8005:8000"
    env_file:
      - .env
    restart: on-failure

  ai_chatbot:
    build:
      context: ./ai_services/ai_chatbot
      dockerfile: Dockerfile
    volumes:
      - ./ai_services/ai_chatbot:/code
    depends_on:
      - broker
    ports:
      - "8006:8000"
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    restart: on-failure

  ai_design_visualization:
    build:
      context: ./ai_services/ai_design_generation_visualization
      dockerfile: Dockerfile
    volumes:
      - ./ai_services/ai_design_generation_visualization:/code
    depends_on:
      - broker
    ports:
      - "8007:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - FLUX_IMAGE_MODEL=${FLUX_IMAGE_MODEL}
      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - KAFKA_DESIGN_TOPIC=${KAFKA_DESIGN_TOPIC}
      - KAFKA_PRODUCT_TOPIC=${KAFKA_PRODUCT_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID=${KAFKA_CONSUMER_GROUP_ID}
    restart: on-failure

  broker:
    image: apache/kafka:3.7.0
    hostname: broker
    container_name: broker
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "Local Kafka Cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "broker:19092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - broker # condition: service_healthy
    restart: on-failure

networks:
  default:
    driver: bridge
    
