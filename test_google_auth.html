<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google OAuth Test</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        max-width: 600px;
        margin: 60px auto;
        padding: 20px;
        background: #0f0f0f;
        color: #e0e0e0;
      }
      h1 {
        color: #4285f4;
      }
      .result {
        margin-top: 20px;
        padding: 16px;
        background: #1a1a2e;
        border-radius: 8px;
        border: 1px solid #333;
        word-break: break-all;
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 13px;
      }
      .success {
        border-color: #34a853;
      }
      .error {
        border-color: #ea4335;
      }
      #status {
        margin-top: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>🔐 Google OAuth Test</h1>
    <p>
      Click the button below to sign in with Google, then the ID token will be
      sent to <code>POST /auth/google</code>
    </p>

    <div
      id="g_id_onload"
      data-client_id="842577171397-jhk4o0885dmj1rtg6m6mj80pe62imr72.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false"
    ></div>
    <div
      class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="filled_blue"
      data-text="sign_in_with"
      data-shape="rectangular"
    ></div>

    <div id="status"></div>
    <div id="result" class="result" style="display: none"></div>

    <script>
      async function handleCredentialResponse(response) {
        const statusEl = document.getElementById("status");
        const resultEl = document.getElementById("result");

        statusEl.textContent = "⏳ Sending token to backend...";
        resultEl.style.display = "none";

        try {
          const res = await fetch("http://localhost:8002/auth/google", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_token: response.credential }),
          });

          const data = await res.json();
          resultEl.style.display = "block";

          if (res.ok) {
            statusEl.textContent = "✅ Login successful!";
            resultEl.className = "result success";
            resultEl.textContent = JSON.stringify(data, null, 2);

            // Decode JWT to show role
            const payload = JSON.parse(atob(data.access_token.split(".")[1]));
            resultEl.textContent +=
              "\n\n--- Decoded JWT ---\n" + JSON.stringify(payload, null, 2);
          } else {
            statusEl.textContent = "❌ Error from backend";
            resultEl.className = "result error";
            resultEl.textContent = JSON.stringify(data, null, 2);
          }
        } catch (err) {
          statusEl.textContent = "❌ Network error";
          resultEl.style.display = "block";
          resultEl.className = "result error";
          resultEl.textContent = err.message;
        }
      }
    </script>
  </body>
</html>
