name: Test and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        cd product_services && uv sync

    - name: Run tests
      run: |
        cd product_services && python -m pytest tests/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Product Service
      run: |
        docker build -t product-service -f ./product_services/Dockerfile .

    - name: Build other services
      run: |
        docker build -t inventory-service -f ./inventory_services/Dockerfile .
        docker build -t user-service -f ./user_services/Dockerfile .
        docker build -t order-service -f ./order_services/Dockerfile .
        docker build -t notification-service -f ./notification_services/Dockerfile .
        docker build -t payment-service -f ./payment_services/Dockerfile .
        docker build -t ai-chatbot-service -f ./ai_services/ai_chatbot/Dockerfile .
        docker build -t ai-design-service -f ./ai_services/ai_design_generation_visualization/Dockerfile .